name: CI

on:
  pull_request:
  push:
    branches: ["main", "work", "prod"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.ci.json

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so the build doesn't fail on missing secrets
          # Real values are set in Vercel environment variables
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy
          AUTH_SECRET: dummy-secret-for-ci-build-only-32chars
          AUTH_TRUST_HOST: "true"
          NEXT_PUBLIC_SENTRY_DSN: ""
          ANTHROPIC_API_KEY: dummy
          OPENAI_API_KEY: dummy
